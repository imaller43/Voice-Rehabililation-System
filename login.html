
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voice Rehabilitation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #221D3A; --header-text: #FFFFFF; --body-bg: #f4f7f6;
            --text-primary: #1F1B2F; --text-secondary: #7F8C8D; --accent-teal: #37BC9B;
            --accent-yellow: #FFD600; --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--body-bg); height: 100vh; display: flex; flex-direction: column; }
        
        /* Bar Atas untuk Pilihan Bahasa */
        .top-bar { display: flex; justify-content: flex-end; padding: 20px 40px; }
        .lang-selector { background: white; color: var(--text-primary); border: 1px solid #ccc; padding: 8px 12px; border-radius: 6px; font-family: 'Poppins', sans-serif; cursor: pointer; outline: none; }
        
        /* Kotak Log Masuk Utama */
        .login-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .yellow-backdrop { position: absolute; width: 450px; height: 400px; background-color: var(--accent-yellow); border-radius: 40px; transform: rotate(5deg); z-index: 0; box-shadow: var(--card-shadow); }
        .login-card { background: white; padding: 50px 40px; border-radius: 16px; box-shadow: var(--card-shadow); text-align: center; width: 100%; max-width: 400px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        
        .logo-icon { width: 60px; height: 60px; background-color: var(--header-bg); color: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; margin: 0 auto; }
        .title { font-size: 22px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
        
        /* Input & Butang */
        .input-group { display: flex; flex-direction: column; text-align: left; gap: 8px; }
        .input-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .name-input { padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 15px; font-family: 'Poppins', sans-serif; transition: border-color 0.3s; }
        .name-input:focus { border-color: var(--accent-teal); outline: none; }
        
        .btn-submit { background-color: var(--header-bg); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: 'Poppins', sans-serif;}
        .btn-submit:hover { background-color: #1a162c; }
        
        /* Mesej Ralat/Status */
        .status-msg { font-size: 13px; font-weight: 500; color: var(--accent-teal); min-height: 20px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <select id="langSelect" class="lang-selector">
            <option value="ms">Bahasa Melayu</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="login-wrapper">
        <div class="yellow-backdrop"></div>
        <div class="login-card">
            <div class="logo-icon">🎙️</div>
            <h1 class="title" id="titleText" data-i18n="loginWelcome">Selamat Datang ke Sistem Pemulihan Suara</h1>
            
            <div class="input-group">
                <label class="input-label" data-i18n="loginPrompt">Sila Masukkan Nama Anda</label>
                <input type="text" id="nameInput" class="name-input" placeholder="Cth: Ahmad Albab" autocomplete="off" required>
            </div>
            
            <div class="status-msg" id="statusMsg"></div>
            
            <button id="loginBtn" class="btn-submit" data-i18n="loginBtn">Log Masuk</button>
        </div>
    </div>

    <script src="translations.js"></script>

    <script>
        // --- 1. SETUP BAHASA ---
        let currentLang = localStorage.getItem('appLang') || 'ms'; // Cek jika pengguna pernah set bahasa sebelum ini
        const langSelect = document.getElementById('langSelect');
        langSelect.value = currentLang;

        function updateLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            localStorage.setItem('appLang', lang); // Simpan pilihan bahasa dalam pelayar
            
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
        }
        
        // Panggil fungsi sekali untuk set bahasa pada mulanya
        updateLanguage(currentLang);

        langSelect.addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        // --- 2. LOGIK SIMULASI PANGKALAN DATA (LOGIN/REGISTER) ---
        const nameInput = document.getElementById('nameInput');
        const loginBtn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('statusMsg');

        function processLogin() {
            const userName = nameInput.value.trim();
            
            if (userName === "") {
                statusMsg.innerText = currentLang === 'ms' ? "Nama tidak boleh kosong." : "Name cannot be empty.";
                statusMsg.style.color = "#E74C3C";
                return;
            }

            // UI Feedback: Menunjukkan sistem sedang "berfikir/memproses"
            statusMsg.innerText = translations[currentLang].loginProcessing;
            statusMsg.style.color = "#37BC9B";
            loginBtn.disabled = true;
            loginBtn.style.opacity = "0.7";

            // Simulasi kelewatan sambungan ke pelayan (Server Delay 1 saat)
            setTimeout(() => {
                // Konsep Pangkalan Data Tempatan (Mock Database)
                // Kita periksa adakah pengguna ini sudah wujud dalam LocalStorage
                let existingUsers = JSON.parse(localStorage.getItem('usersDB')) || {};

                if (existingUsers[userName]) {
                    // Pengguna wujud (Load Data)
                    console.log("Pengguna wujud: Load rekod kemajuan.");
                } else {
                    // Pengguna tiada (Create User Baru)
                    existingUsers[userName] = {
                        level: "Normal",
                        progress: []
                    };
                    localStorage.setItem('usersDB', JSON.stringify(existingUsers));
                    console.log("Pengguna baharu didaftarkan.");
                }

                // Set identiti sesi aktif sekarang
                localStorage.setItem('currentUser', userName);

                // Arahkan (Redirect) ke laman utama
                window.location.href = 'index.html';
                
            }, 1000); // 1000 milisaat = 1 saat
        }

        // Jalankan fungsi jika butang ditekan
        loginBtn.addEventListener('click', processLogin);

        // Jalankan fungsi jika pengguna tekan butang 'Enter' di keyboard
        nameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                processLogin();
            }
        });
    </script>
</body>
</html>
