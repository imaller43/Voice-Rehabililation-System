<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Voice Rehabilitation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #221D3A; --header-text: #FFFFFF; --body-bg: #FFFFFF;
            --text-primary: #1F1B2F; --text-secondary: #7F8C8D; --accent-teal: #37BC9B;
            --accent-yellow: #FFD600; --btn-stop-bg: #E74C3C; --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--body-bg); color: var(--text-primary); }
        
        header { background-color: var(--header-bg); color: var(--header-text); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo { font-size: 20px; font-weight: 600; color: var(--header-text); text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-greeting { font-size: 15px; font-weight: 500; }
        .lang-selector { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px; border-radius: 4px; font-family: 'Poppins', sans-serif; font-size: 14px; cursor: pointer; }
        .lang-selector option { background: var(--header-bg); color: white; }

        /* Butang Log Keluar (Baru) */
        .btn-logout { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); padding: 8px 15px; border-radius: 4px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.3s; margin-left: 5px; }
        .btn-logout:hover { background-color: rgba(255,255,255,0.1); border-color: white; }

        main { margin-top: 80px; padding: 80px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .content-left { display: flex; flex-direction: column; gap: 25px; }
        .main-headline { font-size: 36px; font-weight: 700; color: var(--text-primary); }
        
        .level-badge-container { padding: 20px; background-color: #F8F9FA; border-radius: 10px; border-left: 5px solid var(--header-bg); }
        .level-label { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 5px; }
        
        .btn-training { background-color: var(--accent-teal); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; display: inline-block; width: fit-content; transition: 0.3s; text-align: center; font-family: 'Poppins', sans-serif; }
        .btn-training:hover { background-color: #2F9A80; box-shadow: 0 4px 12px rgba(55,188,155,0.3); }

        .visual-right { position: relative; display: flex; justify-content: center; align-items: center; }
        .yellow-backdrop { position: absolute; width: 100%; height: 100%; background-color: var(--accent-yellow); border-radius: 40px; transform: rotate(-3deg); z-index: -1; box-shadow: var(--card-shadow); }
        .recording-container { background: white; padding: 30px; border-radius: 12px; box-shadow: var(--card-shadow); text-align: center; width: 100%; max-width: 450px; z-index: 10; }
        .section-title { font-size: 18px; margin-bottom: 20px; }
        .status-box { margin: 15px 0; font-size: 14px; background: #F8F9FA; padding: 10px; border-radius: 6px; }
        .btn-controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .btn-control { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: 'Poppins', sans-serif;}
        .btn-control:disabled { background-color: #95a5a6; cursor: not-allowed; color: rgba(255,255,255,0.7); }
        .btn-mula { background-color: var(--accent-teal); color: white; }
        .btn-henti { background-color: var(--btn-stop-bg); color: white; }
        audio { margin-top: 20px; width: 100%; border-radius: 8px; height: 35px; }
        
        .result-panel { margin-top: 20px; padding: 15px; background-color: #F0FBF9; border-left: 4px solid var(--accent-teal); border-radius: 5px; display: none; text-align: left; }
        .result-panel h4 { color: var(--text-primary); font-size: 15px; margin-bottom: 5px; }
        .result-panel p { color: var(--text-secondary); font-size: 13px; }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } header { padding: 15px 20px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo" data-i18n="logoTitle">Voice Rehabilitation System</div>
        <div class="nav-right">
            <div class="user-greeting">
                <span data-i18n="hiUser">Hi, </span><span id="clientName" style="font-weight: 600;">Pesakit</span>
            </div>
            <select id="langSelect" class="lang-selector">
                <option value="ms">Bahasa Melayu</option>
                <option value="en">English</option>
            </select>
            <button id="logoutBtn" class="btn-logout" data-i18n="btnLogout">Daftar Keluar</button>
        </div>
    </header>

    <main>
        <div class="content-left">
            <h1 class="main-headline" data-i18n="diagnoseTitle">Diagnose your Voice</h1>
            
            <div class="level-badge-container">
                <div class="level-label" data-i18n="selectLevelLabel">Pilih Tahap Latihan Anda:</div>
                <div id="levelsListContainer">Memuatkan data...</div>
            </div>
            
            <a href="training.html" class="btn-training" data-i18n="btnToTraining">Ke Laman Latihan ➔</a>
        </div>

        <div class="visual-right">
            <div class="yellow-backdrop"></div>
            <div class="recording-container">
                <h3 class="section-title" data-i18n="boxTitle">🎙️ Rakaman Diagnostik</h3>
                <div class="status-box" id="statusText">Status: Sedia...</div>
                
                <div class="btn-controls">
                    <button id="startBtn" class="btn-control btn-mula" data-i18n="btnStart">▶ Mula Diagnosis</button>
                    <button id="stopBtn" class="btn-control btn-henti" disabled data-i18n="btnStop">🛑 Berhenti</button>
                </div>

                <audio id="audioPlayback" controls></audio>

                <div class="result-panel" id="resultPanel">
                    <h4 data-i18n="resultTitle">Keputusan Analisis:</h4>
                    <p><span data-i18n="resultLevel">Tahap Dikesan: </span> <span id="levelText" style="font-weight: bold; color: #d35400;">Normal</span></p>
                </div>
            </div>
        </div>
    </main>

    <script src="translations.js"></script>

    <script>
    // --- PENYEDIAAN SESI SEMASA ---
    const currentUser = localStorage.getItem('currentUser') || "Guest";
    
    // Jika tiada sesi / belum login, tendang balik ke muka log masuk
    if (currentUser === "Guest") {
        window.location.href = 'login.html';
    }
    
    document.getElementById('clientName').innerText = currentUser;
    let currentLang = localStorage.getItem('appLang') || 'ms';
    document.getElementById('langSelect').value = currentLang;

    // --- LOGIK LOGOUT (BARU) ---
    document.getElementById('logoutBtn').addEventListener('click', () => {
        let confirmMsg = translations[currentLang].logoutConfirm;
        if (confirm(confirmMsg)) {
            localStorage.removeItem('currentUser'); // Padam nama pengguna yang aktif
            window.location.href = 'login.html'; // Bawa balik ke skrin depan
        }
    });

    // Fungsi Tukar Nama AI Ke Key Piawai (Standard)
    function getStandardLevel(lvlStr) {
        let s = (lvlStr || "").toLowerCase();
        if(s.includes("teruk") || s.includes("severe")) return "SEVERE";
        if(s.includes("sederhana") || s.includes("moderate")) return "MODERATE";
        if(s.includes("kurang") || s.includes("mild")) return "MILD";
        if(s.includes("normal")) return "NORMAL";
        return "";
    }

    // Fungsi Render Pilihan Level Pesakit
    function loadPatientData() {
        let usersDB = JSON.parse(localStorage.getItem('usersDB')) || {};
        let patient = usersDB[currentUser];

        // Migrasi Data Lama Jika Tiada Array 'levels'
        if (patient && !patient.levels) {
            patient.levels = [];
            let std = getStandardLevel(patient.level);
            if(std) patient.levels.push(std);
            patient.level = std;
        }

        const levelsContainer = document.getElementById('levelsListContainer');
        levelsContainer.innerHTML = "";

        if (patient && patient.levels && patient.levels.length > 0) {
            patient.levels.forEach((lvl) => {
                let displayStr = ""; let colorStr = "";
                if(lvl === "SEVERE") { displayStr = currentLang==='ms'?"Teruk":"Severe"; colorStr = "#E74C3C"; }
                else if(lvl === "MODERATE") { displayStr = currentLang==='ms'?"Sederhana":"Moderate"; colorStr = "#D35400"; }
                else if(lvl === "MILD") { displayStr = currentLang==='ms'?"Kurang":"Mild"; colorStr = "#F39C12"; }
                else if(lvl === "NORMAL") { displayStr = "Normal"; colorStr = "#27AE60"; }

                let isChecked = (patient.level === lvl) ? "checked" : "";

                levelsContainer.innerHTML += `
                    <label style="display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 12px; background: white; border-radius: 8px; border: 1px solid #eee; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
                        <input type="radio" name="levelSelect" value="${lvl}" ${isChecked} onchange="selectTrainingLevel('${lvl}')">
                        <span style="font-size: 16px; font-weight: 600; color: ${colorStr};">${displayStr}</span>
                    </label>
                `;
            });
            // Auto Select Jika Tiada Pilihan Dibuat
            if (!patient.level || !patient.levels.includes(patient.level)) {
                selectTrainingLevel(patient.levels[patient.levels.length - 1]);
            }
        } else {
            levelsContainer.innerHTML = `<div style="font-size: 15px; font-weight: 600; color: #7F8C8D; margin-top: 10px;" data-i18n="diagnoseRequired">${translations[currentLang].diagnoseRequired}</div>`;
        }
    }

    // Fungsi Mengemaskini Tahap Latihan Dipilih Ke Database
    window.selectTrainingLevel = function(lvl) {
        let usersDB = JSON.parse(localStorage.getItem('usersDB')) || {};
        if (usersDB[currentUser]) {
            usersDB[currentUser].level = lvl;
            localStorage.setItem('usersDB', JSON.stringify(usersDB));
        }
    }

    function updateLanguage(lang) {
        currentLang = lang; document.documentElement.lang = lang; localStorage.setItem('appLang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => {
            if (translations[lang][el.getAttribute('data-i18n')]) {
                el.innerText = translations[lang][el.getAttribute('data-i18n')];
            }
        });
        if(document.getElementById('startBtn').disabled === false) {
            document.getElementById('statusText').innerText = translations[lang].statusReady;
        }
        loadPatientData(); 
    }

    document.getElementById('langSelect').addEventListener('change', (e) => updateLanguage(e.target.value));
    updateLanguage(currentLang); 

    // --- LOGIK RAKAMAN & SISTEM OVERWRITE ---
    let mediaRecorder; let audioChunks = [];
    const startBtn = document.getElementById('startBtn'); const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText'); const audioPlayback = document.getElementById('audioPlayback');
    const resultPanel = document.getElementById('resultPanel'); const levelText = document.getElementById('levelText');

    startBtn.addEventListener('click', async () => {
        let usersDB = JSON.parse(localStorage.getItem('usersDB')) || {};
        let patient = usersDB[currentUser] || {};
        let pLevels = patient.levels || [];

        // Paparkan amaran jika kotak sudah penuh (2 Level)
        if (pLevels.length >= 2) {
            let confirmMsg = translations[currentLang].overwriteWarning;
            if (!confirm(confirmMsg)) {
                return; 
            }
        }

        try {
            if (!mediaRecorder) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.addEventListener("dataavailable", event => audioChunks.push(event.data));
                
                mediaRecorder.addEventListener("stop", async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioPlayback.src = URL.createObjectURL(audioBlob);
                    
                    // Tunjukkan status "Memproses" sementara menunggu Python membalas
                    statusText.innerText = "Status: 🟡 Menghantar ke Pelayan AI...";
                    statusText.style.color = "#F39C12";
                    resultPanel.style.display = "none";

                    // 1. Bungkus fail audio ke dalam format Form-Data
                    const formData = new FormData();
                    formData.append("audio", audioBlob, "diagnostic.wav");

                    try {
                        // 2. Tembak API ke Pelayan Python (Flask)
                        const response = await fetch("http://127.0.0.1:5000/api/diagnose", {
                            method: "POST",
                            body: formData
                        });

                        if (!response.ok) {
                            throw new Error("Ralat sambungan ke pelayan AI.");
                        }

                        // 3. Terima maklum balas dari Python
                        const data = await response.json();
                        
                        // Cth data.level = "SEVERE", "MODERATE", "MILD", atau "NORMAL"
                        const stdDetected = getStandardLevel(data.level); 
                        
                        // Paparkan perkataan mengikut bahasa yang dipilih pengguna
                        let displayLvlStr = stdDetected;
                        if(currentLang === 'ms') {
                            if(stdDetected === "SEVERE") displayLvlStr = "Teruk";
                            if(stdDetected === "MODERATE") displayLvlStr = "Sederhana";
                            if(stdDetected === "MILD") displayLvlStr = "Kurang";
                            if(stdDetected === "NORMAL") displayLvlStr = "Normal";
                        }
                        
                        levelText.innerText = displayLvlStr;
                        resultPanel.style.display = "block";

                        // --- LOGIK DATABASE (Sama seperti sebelum ini) ---
                        let db = JSON.parse(localStorage.getItem('usersDB')) || {};
                        if (!db[currentUser]) db[currentUser] = { levels: [], level: "" };
                        let pat = db[currentUser];
                        if (!pat.levels) pat.levels = [];

                        if (pat.levels.includes(stdDetected)) {
                            alert(translations[currentLang].sameLevelMsg);
                        } else {
                            if (pat.levels.length >= 2) {
                                pat.levels.shift(); 
                            }
                            pat.levels.push(stdDetected);
                            pat.level = stdDetected; 
                        }

                        localStorage.setItem('usersDB', JSON.stringify(db));
                        loadPatientData(); // Refresh UI Kiri

                        // Kemas kini status selesai
                        statusText.innerText = translations[currentLang].statusDone;
                        statusText.style.color = "#37BC9B"; 

                    } catch (error) {
                        console.error(error);
                        alert("Gagal berhubung dengan AI. Pastikan pelayan Python (app.py) sedang berjalan!");
                        statusText.innerText = "Status: ❌ Ralat Pelayan AI";
                        statusText.style.color = "#E74C3C";
                    }
                });
            }

            audioChunks = []; mediaRecorder.start();
            statusText.innerText = translations[currentLang].statusRec;
            statusText.style.color = "#E74C3C"; startBtn.disabled = true; stopBtn.disabled = false; resultPanel.style.display = "none";
        } catch (error) {
            alert("Akses mikrofon ditolak! Pastikan dibenarkan dan URL menggunakan localhost.");
        }
    });

    stopBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            statusText.innerText = translations[currentLang].statusDone;
            statusText.style.color = "#37BC9B"; startBtn.disabled = false; stopBtn.disabled = true;
        }
    });
    </script>
</body>
</html>
